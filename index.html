<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A customizable CV Maker that lets users edit, style, preview, print, and export a professional resume.">
    <title>CV Maker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231a1a2e'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white'>CV</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Poppins:wght@400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/themes.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/print.css" media="print">
</head>
<body>
    <header class="toolbar no-print">
        <div class="toolbar-left">
            <h1 class="app-title">CV Maker</h1>
        </div>
        <div class="toolbar-center mobile-only">
            <button id="btn-edit" class="view-tab active">Edit</button>
            <button id="btn-preview" class="view-tab">Preview</button>
        </div>
        <div class="toolbar-right">
            <button id="btn-save" class="toolbar-btn">Save</button>
            <button id="btn-reset" class="toolbar-btn">Reset</button>
            <button id="btn-export" class="toolbar-btn">Export</button>
            <button id="btn-import" class="toolbar-btn">Import</button>
            <button id="btn-print" class="toolbar-btn btn-print">Print / PDF</button>
        </div>
    </header>

    <div class="app-layout">
        <aside id="editor-panel" class="editor-panel no-print"></aside>
        <main id="cv-preview" class="cv-preview"></main>
    </div>

    <footer class="no-print">
        <p>CV Maker &copy; <span data-current-year>2026</span> &mdash; Edit, Customize, Preview, Print</p>
    </footer>

    <script src="scripts/data.js"></script>
    <script src="scripts/validation.js"></script>
    <script src="scripts/migration.js"></script>
    <script src="scripts/storage.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/export.js"></script>
    <script src="scripts/preview.js"></script>
    <script src="scripts/editor.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
